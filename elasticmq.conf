include classpath("application.conf")

# Node address configuration
node-address {
  protocol = http
  host = "*"
  port = 9324
  context-path = ""
}

# REST SQS interface
rest-sqs {
  enabled = true
  bind-port = 9324
  bind-hostname = "0.0.0.0"
  sqs-limits = strict
}

# REST stats interface (management UI)
rest-stats {
  enabled = true
  bind-port = 9325
  bind-hostname = "0.0.0.0"
}

# Pre-configured queues
queues {
  # Default fallback queue
  default-queue {
    default-visibility-timeout = 10 seconds
    delay = 0 seconds
    receive-message-wait = 0 seconds
  }

  # Queue for user onboarding workflow events
  user-onboarding-queue {
    default-visibility-timeout = 30 seconds
    delay = 0 seconds
    receive-message-wait = 5 seconds
  }

  # Queue for push/email notifications
  notifications-queue {
    default-visibility-timeout = 15 seconds
    delay = 0 seconds
    receive-message-wait = 0 seconds
  }

  # Dead letter queue for failed message processing
  dead-letter-queue {
    default-visibility-timeout = 60 seconds
    delay = 0 seconds
    receive-message-wait = 0 seconds
  }
}
