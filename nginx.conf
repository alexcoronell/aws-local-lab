events {
  worker_connections 1024;
}

http {

  # ============================================================
  # Upstream definitions — backend service routing
  # ============================================================

  # LocalStack — Lambda, API Gateway, Step Functions
  upstream localstack {
    server localstack:4566;
  }

  # MinIO — S3 equivalent
  upstream minio {
    server minio:9000;
  }

  # Keycloak — Cognito equivalent
  upstream keycloak {
    server keycloak:8080;
  }

  # ============================================================
  # Virtual host: API Gateway → LocalStack
  # Access via: http://api.localhost
  # ============================================================
  server {
    listen 80;
    server_name api.localhost;

    location / {
      proxy_pass http://localstack;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }

  # ============================================================
  # Virtual host: S3 → MinIO
  # Access via: http://s3.localhost
  # ============================================================
  server {
    listen 80;
    server_name s3.localhost;

    location / {
      proxy_pass http://minio;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }

  # ============================================================
  # Virtual host: Auth → Keycloak
  # Access via: http://auth.localhost
  # ============================================================
  server {
    listen 80;
    server_name auth.localhost;

    location / {
      proxy_pass http://keycloak;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
